machine:
  timezone:
    Europe/Berlin

dependencies:
  pre:
  - sudo apt-get update
  - sudo apt-get install clang
  - sudo apt-get install build-essential libtool autotools-dev automake checkinstall check yasm
  - sudo apt-get install pkg-config

# ------------ network_test requires that "localhost" resolves to ::1 ------------
  - sudo bash -c "echo '::1             localhost ipv6-localhost ipv6-loopback' >> /etc/hosts" # ipv6 localhost entry
# ------------ network_test requires that "localhost" resolves to ::1 ------------

  - java -version ; exit 0
  - gcc --version ; exit 0
  - clang --version ; exit 0

compile:
  pre:
    - echo "dummy"
  override:
    - make > $CIRCLE_ARTIFACTS/make_out.txt 2>&1 ; touch ~/ready.txt :
        background: true

    - ready_="0";
      counter=0;
      while [ $ready_ == "0" ]; do
      echo "running ...";
      counter=$[ $counter + 1 ] ;
      if [ $counter -eq 38 ] ; then exit 0 ; fi ;
      if [ ! -f ~/ready.txt ]; then
      sleep 180 ;
      else ready_="1" ;
      fi ;
      done ;
      exit 0

test:
  override:
    echo "dummy"


